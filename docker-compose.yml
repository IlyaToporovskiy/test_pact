services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pact-demo-api
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 3s
      timeout: 3s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      PROVIDER_BASE_URL: http://api:8000
    command: ["pytest", "-q", "tests/consumer", "tests/provider"]
